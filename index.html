<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Parashut">
<meta name="theme-color" content="#f5f4f0">
<title>Parashut</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap');
:root{--bg:#f5f4f0;--surface:#fff;--text:#1a1a18;--muted:#8a8a85;--line:#e8e8e2;--done:#c8c8c2;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
.screen{display:none;max-width:560px;margin:0 auto;padding:48px 24px 80px;}
.screen.active{display:block;}
.ob-logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.ob-title{font-family:'DM Mono',monospace;font-size:32px;font-weight:300;letter-spacing:-.02em;margin-bottom:32px;}
.ob-desc{font-size:13px;color:var(--muted);line-height:1.7;margin-bottom:36px;}
.node-box{display:flex;align-items:baseline;gap:8px;margin-bottom:40px;padding:20px 24px;border:1px solid var(--line);background:var(--surface);}
.node-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);}
.node-num{font-family:'DM Mono',monospace;font-size:44px;font-weight:300;letter-spacing:-.04em;}
.f-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px;}
.f-inp{width:100%;background:var(--surface);border:1px solid var(--line);padding:12px 14px;font-family:'DM Mono',monospace;font-size:13px;color:var(--text);outline:none;margin-bottom:20px;transition:border-color .2s;}
.f-inp:focus{border-color:var(--text);}
.f-inp::placeholder{color:var(--done);}
.btn-reg{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--surface);background:var(--text);border:none;padding:14px;cursor:pointer;width:100%;transition:opacity .2s;}
.btn-reg:hover{opacity:.8;}
.btn-reg:disabled{opacity:.4;cursor:not-allowed;}
.ob-err{font-family:'DM Mono',monospace;font-size:10px;color:#c0392b;margin-top:10px;min-height:14px;}
.hdr{margin-bottom:40px;}
.hdr-top{display:flex;justify-content:space-between;align-items:flex-start;}
.logo{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:4px;}
.date-txt{font-family:'DM Mono',monospace;font-size:26px;font-weight:300;letter-spacing:-.02em;}
.nbadge{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:right;}
.nbadge strong{color:var(--text);font-weight:400;}
.prog-row{display:flex;align-items:center;gap:12px;margin-top:14px;}
.prog-track{flex:1;height:1px;background:var(--line);position:relative;}
.prog-fill{position:absolute;left:0;top:0;height:100%;background:var(--text);transition:width .4s;}
.prog-pct{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);min-width:32px;text-align:right;}
.nav{display:flex;margin-bottom:36px;border-bottom:1px solid var(--line);}
.nav-btn{font-family:'DM Mono',monospace;font-size:11px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);background:none;border:none;padding:12px 0;margin-right:24px;cursor:pointer;position:relative;transition:color .2s;}
.nav-btn.active{color:var(--text);}
.nav-btn.active::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:1px;background:var(--text);}
.view{display:none;}
.view.active{display:block;}
.sec-lbl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:28px 0 10px;}
.sec-lbl:first-child{margin-top:0;}
.task{display:flex;align-items:flex-start;gap:12px;padding:12px 0;border-bottom:1px solid var(--line);transition:opacity .2s;}
.task.done{opacity:.35;}
.task-chk{width:15px;height:15px;border:1px solid var(--done);flex-shrink:0;margin-top:2px;position:relative;cursor:pointer;transition:all .2s;}
.task:hover .task-chk{border-color:var(--text);}
.task.done .task-chk{background:var(--text);border-color:var(--text);}
.task.done .task-chk::after{content:'';position:absolute;left:2px;top:1px;width:8px;height:4px;border-left:1px solid #fff;border-bottom:1px solid #fff;transform:rotate(-45deg);}
.task-body{flex:1;min-width:0;}
.task-time{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:2px;}
.task-title{font-size:14px;line-height:1.4;word-break:break-word;}
.task.done .task-title{text-decoration:line-through;color:var(--muted);}
.task-tag{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;color:var(--done);margin-top:3px;}
.task-del{font-size:16px;color:var(--done);background:none;border:none;cursor:pointer;padding:0 4px;flex-shrink:0;align-self:center;transition:color .2s;}
.task-del:hover{color:#c0392b;}
.add-row{display:flex;gap:8px;margin-top:24px;padding-top:24px;border-top:1px solid var(--line);}
.add-inp{flex:1;background:var(--surface);border:1px solid var(--line);padding:10px 12px;font-family:'DM Mono',monospace;font-size:12px;color:var(--text);outline:none;transition:border-color .2s;}
.add-inp:focus{border-color:var(--text);}
.add-inp::placeholder{color:var(--done);}
.add-btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--surface);background:var(--text);border:none;padding:10px 16px;cursor:pointer;white-space:nowrap;}
.btns{display:flex;gap:10px;margin-top:28px;flex-wrap:wrap;}
.btn{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);background:none;border:1px solid var(--line);padding:9px 14px;cursor:pointer;transition:all .2s;}
.btn:hover{color:var(--text);border-color:var(--text);}
.btn-red{color:#c0392b;border-color:#e8c8c2;}
.btn-red:hover{border-color:#c0392b;}
.save-note{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:10px;text-align:right;min-height:14px;}
.reset-row{display:none;font-family:'DM Mono',monospace;font-size:11px;margin-top:12px;gap:12px;align-items:center;}
.reset-row.show{display:flex;}
.cfm{cursor:pointer;text-decoration:underline;}

/* CHART — Japanese candles */
.chart-empty{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);padding:48px 0;text-align:center;border:1px dashed var(--line);}
.candles-outer{position:relative;margin-bottom:24px;}
.candles-wrap{display:flex;align-items:flex-end;gap:3px;padding-bottom:28px;border-bottom:1px solid var(--line);position:relative;}
.c-col{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:flex-end;position:relative;min-width:0;}
.c-wick{width:1px;background:var(--done);position:absolute;bottom:0;}
.c-body{width:40%;max-width:12px;min-height:4px;position:absolute;bottom:0;border-radius:1px;}
.c-pct{font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);position:absolute;white-space:nowrap;text-align:center;width:100%;}
.c-date{position:absolute;bottom:-22px;font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);white-space:nowrap;text-align:center;width:100%;}
.avg-line{position:absolute;left:0;right:0;height:1px;background:var(--done);pointer-events:none;}
.avg-label{position:absolute;right:0;font-family:'DM Mono',monospace;font-size:8px;color:var(--muted);}

.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--line);border:1px solid var(--line);margin-bottom:16px;}
.stat-cell{background:var(--surface);padding:14px;text-align:center;}
.stat-n{font-family:'DM Mono',monospace;font-size:20px;font-weight:300;display:block;}
.stat-l{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);display:block;margin-top:3px;}

.lb-ttl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.lb-tbl{width:100%;border-collapse:collapse;}
.lb-tbl th{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);text-align:left;padding:8px 0;border-bottom:1px solid var(--line);font-weight:400;}
.lb-tbl th:last-child,.lb-tbl td:last-child{text-align:right;}
.lb-tbl td{font-family:'DM Mono',monospace;font-size:12px;padding:10px 0;border-bottom:1px solid var(--line);}
.lb-tbl tr:last-child td{border-bottom:none;}
.lb-tbl tr.me td{font-weight:500;}
.lb-rank{color:var(--muted);font-size:10px;}
.lb-you{font-size:9px;color:var(--muted);margin-left:6px;}
.lb-bar{display:inline-block;height:2px;background:var(--done);vertical-align:middle;margin-right:8px;}
.lb-bar.me{background:var(--text);}
.hash-sec{margin-top:32px;padding-top:24px;border-top:1px solid var(--line);}
.hash-sec-ttl{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;}
.hash-desc{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-bottom:16px;line-height:1.7;}
.hash-box{background:var(--surface);border:1px solid var(--line);padding:16px;margin-bottom:12px;cursor:pointer;transition:border-color .2s;display:none;}
.hash-box:hover{border-color:var(--text);}
.hash-val{font-family:'DM Mono',monospace;font-size:11px;color:var(--text);word-break:break-all;letter-spacing:.03em;line-height:1.7;user-select:all;}
.hash-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:8px;}
.hash-copied{font-family:'DM Mono',monospace;font-size:10px;color:var(--muted);margin-top:8px;min-height:14px;}
.hash-item{padding:14px 0;border-bottom:1px solid var(--line);}
.hash-item:last-child{border-bottom:none;}
.hash-item-val{font-family:'DM Mono',monospace;font-size:10px;word-break:break-all;line-height:1.6;}
.hash-item-meta{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:4px;}
.hash-item-btns{display:flex;gap:8px;margin-top:8px;}
.h-btn{font-family:'DM Mono',monospace;font-size:9px;letter-spacing:.08em;text-transform:uppercase;background:none;border:1px solid var(--line);padding:5px 10px;cursor:pointer;color:var(--muted);transition:all .2s;}
.h-btn:hover{color:var(--text);border-color:var(--text);}
.h-btn-red{color:#c0392b;border-color:#e8c8c2;}
.h-btn-red:hover{border-color:#c0392b;}
.h-status{font-size:9px;color:var(--muted);}
.h-status.used{color:#27ae60;}
.h-status.revoked{color:#c0392b;}
.prof-sec{margin-top:32px;padding-top:24px;border-top:1px solid var(--line);}
.prof-row{display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid var(--line);}
.prof-row:last-child{border-bottom:none;}
.prof-key{font-family:'DM Mono',monospace;font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);}
.prof-val{font-family:'DM Mono',monospace;font-size:12px;}
.note{font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);margin-top:12px;line-height:1.6;}
.loading{font-family:'DM Mono',monospace;font-size:11px;color:var(--muted);text-align:center;padding:40px 0;}

@media(max-width:480px){
  .screen{padding:28px 16px 72px;}
  .ob-title{font-size:26px;}
  .node-num{font-size:36px;}
  .date-txt{font-size:20px;}
  .nav-btn{font-size:10px;margin-right:16px;}
  .task-title{font-size:13px;}
  .add-row{flex-wrap:wrap;}
  .add-btn{width:100%;}
  .btns{gap:8px;}
  .btn{font-size:9px;padding:8px 10px;}
  .stat-n{font-size:16px;}
}
@media(max-width:360px){
  .screen{padding:20px 14px 64px;}
  .ob-title{font-size:22px;}
  .node-num{font-size:30px;}
  .date-txt{font-size:18px;}
  .nav-btn{font-size:9px;margin-right:12px;}
}
@supports(padding:max(0px)){
  .screen{
    padding-left:max(16px,env(safe-area-inset-left));
    padding-right:max(16px,env(safe-area-inset-right));
    padding-bottom:max(72px,calc(env(safe-area-inset-bottom)+60px));
  }
}
@media(hover:none) and (pointer:coarse){
  .task-chk{width:20px;height:20px;}
  .task-del{font-size:20px;padding:0 8px;}
  .nav-btn{padding:14px 0;}
  .btn{padding:11px 16px;}
}
</style>
</head>

<script>
const SB_URL = 'https://maqxiowaiqemzjdogrwx.supabase.co';
const SB_KEY = 'sb_publishable_kZGntPrD21oKS0fIdWCyOA_2LFYwXBe';

async function sbFetch(path, method='GET', body=null, extra={}){
  const opts = {
    method,
    headers:{
      'apikey': SB_KEY,
      'Authorization': 'Bearer '+SB_KEY,
      'Content-Type': 'application/json',
      ...extra
    }
  };
  if(body) opts.body = JSON.stringify(body);
  const r = await fetch(SB_URL+path, opts);
  if(!r.ok){ const e=await r.text(); throw new Error(e); }
  const txt = await r.text();
  return txt ? JSON.parse(txt) : null;
}

const TODAY = new Date().toLocaleDateString('uk-UA',{day:'2-digit',month:'2-digit',year:'numeric'});
const TODAY_KEY = new Date().toISOString().slice(0,10);
const MASTER = 'QwertyQ22$';
const PROFILE_KEY = 'prs_profile_v2';

const DEFAULT_TASKS = [
  {id:'d0',sec:'Пік — найважче першим',time:'10:30–11:00',title:'Активація мозку',tag:'мозок',done:false},
  {id:'d1',sec:'Пік — найважче першим',time:'11:00–12:30',title:'Дослідження топових активів',tag:'фокус',done:false},

function getProfile(){try{return JSON.parse(localStorage.getItem(PROFILE_KEY));}catch(e){return null;}}
function setProfile(p){localStorage.setItem(PROFILE_KEY,JSON.stringify(p));}

async function sha256(str){
  const buf = await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function showTab(t){
  const isReg=t==='reg';
  document.getElementById('pane-reg').style.display=isReg?'block':'none';
  document.getElementById('pane-login').style.display=isReg?'none':'block';
  document.getElementById('tab-reg').style.color=isReg?'#1a1a18':'#8a8a85';
  document.getElementById('tab-login').style.color=isReg?'#8a8a85':'#1a1a18';
  document.getElementById('tab-reg-line').style.display=isReg?'block':'none';
  document.getElementById('tab-login-line').style.display=isReg?'none':'block';
}

async function doLogin(){
  const nodeNum=parseInt(document.getElementById('l-node').value);
  const name=document.getElementById('l-name').value.trim();
  const pass=document.getElementById('l-pass').value.trim();
  const err=document.getElementById('l-err');
  const btn=document.getElementById('login-btn');
  err.textContent='';
  if(isNaN(nodeNum)){err.textContent='Введіть номер Node';return;}
  if(!name){err.textContent='Введіть ім\'я';return;}
  if(!pass){err.textContent='Введіть пароль';return;}
  btn.disabled=true;btn.textContent='Вхід...';
  try{
    const nodes=await sbFetch('/rest/v1/nodes?node_number=eq.'+nodeNum+'&select=*');
    if(!nodes||!nodes.length){err.textContent='Node не знайдено';btn.disabled=false;btn.textContent='Увійти';return;}
    const node=nodes[0];
    if(node.name.toLowerCase()!==name.toLowerCase()){err.textContent='Невірне ім\'я';btn.disabled=false;btn.textContent='Увійти';return;}
    const isNode0=nodeNum===0&&pass===MASTER;
    let validHash=false;
    if(!isNode0){
      const hashes=await sbFetch('/rest/v1/hashes?used_node=eq.'+nodeNum+'&select=hash');
      if(hashes&&hashes.length) validHash=hashes.some(h=>h.hash===pass);
    }
    if(!isNode0&&!validHash){err.textContent='Невірний пароль';btn.disabled=false;btn.textContent='Увійти';return;}
    const p={node:nodeNum,name:node.name,joinedAt:node.joined_at,invitedBy:node.invited_by};
    setProfile(p);
    startApp(p);
  }catch(e){
    err.textContent='Помилка: '+e.message;
    btn.disabled=false;btn.textContent='Увійти';
  }
}

async function doRegister(){
  const name=document.getElementById('r-name').value.trim();
  const pass=document.getElementById('r-pass').value.trim();
  const err=document.getElementById('r-err');
  const btn=document.getElementById('reg-btn');
  err.textContent='';
  if(!name){err.textContent='Введіть ім\'я';return;}
  if(!pass){err.textContent='Введіть пароль або хеш';return;}
  btn.disabled=true; btn.textContent='Підключення...';
  try{
    if(pass===MASTER){
      const existing=await sbFetch('/rest/v1/nodes?node_number=eq.0&select=node_number');
      if(existing&&existing.length>0){err.textContent='Node 0 вже зайнятий';btn.disabled=false;btn.textContent='Увійти в мережу';return;}
      await sbFetch('/rest/v1/nodes','POST',{node_number:0,name,joined_at:TODAY_KEY,invited_by:null,avg_eff:0,days:0},{'Prefer':'return=representation'});
      const p={node:0,name,joinedAt:TODAY_KEY,invitedBy:null};
      setProfile(p); startApp(p); return;
    }
    const hashes=await sbFetch('/rest/v1/hashes?hash=eq.'+encodeURIComponent(pass)+'&select=*');
    if(!hashes||!hashes.length||hashes[0].used_by||hashes[0].revoked){
      err.textContent='Невірний пароль або хеш вже використано / деактивовано';
      btn.disabled=false; btn.textContent='Увійти в мережу'; return;
    }
    const hashEntry=hashes[0];
    const allNodes=await sbFetch('/rest/v1/nodes?select=node_number&order=node_number.desc&limit=1');
    const nextNode=allNodes&&allNodes.length>0?allNodes[0].node_number+1:1;
    await sbFetch('/rest/v1/nodes','POST',{node_number:nextNode,name,joined_at:TODAY_KEY,invited_by:hashEntry.issued_by,avg_eff:0,days:0},{'Prefer':'return=representation'});
    await sbFetch('/rest/v1/hashes?id=eq.'+hashEntry.id,'PATCH',{used_by:name,used_node:nextNode,used_at:TODAY_KEY});
    const p={node:nextNode,name,joinedAt:TODAY_KEY,invitedBy:hashEntry.issued_by};
    setProfile(p); startApp(p);
  }catch(e){
    err.textContent='Помилка: '+e.message;
    btn.disabled=false; btn.textContent='Увійти в мережу';
  }
}

function startApp(p){
  document.getElementById('s-onboard').classList.remove('active');
  document.getElementById('s-main').classList.add('active');
  document.getElementById('h-date').textContent=TODAY;
  document.getElementById('h-node').innerHTML='<strong>Node '+p.node+'</strong>';
  document.getElementById('h-name').textContent=p.name;
  loadTasks();
  document.getElementById('q-title').addEventListener('keydown',e=>{if(e.key==='Enter')quickAdd();});
}

async function boot(){
  const p=getProfile();
  if(p){ startApp(p); }
  else{
    try{
      const nodes=await sbFetch('/rest/v1/nodes?select=node_number');
      document.getElementById('ob-node').textContent=nodes?nodes.length:0;
    }catch(e){ document.getElementById('ob-node').textContent='?'; }
  }
}

let localTasks=null;

async function loadTasks(){
  const p=getProfile();
  const wrap=document.getElementById('tasks-wrap');
  wrap.innerHTML='<div class="loading">Завантаження...</div>';
  try{
    const dbTasks=await sbFetch('/rest/v1/tasks?node_number=eq.'+p.node+'&date=eq.'+TODAY_KEY+'&select=*&order=id.asc');
    if(dbTasks&&dbTasks.length>0){
      localTasks=dbTasks.map(t=>({id:t.task_id,sec:t.section||'',time:t.time_slot||'',title:t.title,tag:t.tag||'',done:t.done,dbId:t.id}));
    } else {
      localTasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));
      await saveTasksToDB(localTasks);
    }
  }catch(e){ localTasks=JSON.parse(JSON.stringify(DEFAULT_TASKS)); }
  renderTasks();
}

async function saveTasksToDB(tasks){
  const p=getProfile();
  try{
    await sbFetch('/rest/v1/tasks?node_number=eq.'+p.node+'&date=eq.'+TODAY_KEY,'DELETE');
    const rows=tasks.map(t=>({node_number:p.node,task_id:t.id,section:t.sec||null,time_slot:t.time||null,title:t.title,tag:t.tag||null,done:t.done,date:TODAY_KEY}));
    if(rows.length>0) await sbFetch('/rest/v1/tasks','POST',rows,{'Prefer':'return=representation'});
  }catch(e){console.error('saveTasksToDB',e);}
}

async function updateTaskDone(taskId,done){
  const p=getProfile();
  try{ await sbFetch('/rest/v1/tasks?node_number=eq.'+p.node+'&task_id=eq.'+encodeURIComponent(taskId)+'&date=eq.'+TODAY_KEY,'PATCH',{done}); }
  catch(e){console.error('updateTaskDone',e);}
}

function renderTasks(){
  const tasks=localTasks||[];
  const wrap=document.getElementById('tasks-wrap');
  if(!tasks.length){
    wrap.innerHTML='<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);padding:24px 0;text-align:center;border:1px dashed var(--line)">Список порожній. Додайте задачі нижче.</div>';
    updateProg(tasks); return;
  }
  const secs={},noSec=[];
  tasks.forEach(t=>{ if(t.sec){if(!secs[t.sec])secs[t.sec]=[];secs[t.sec].push(t);}else noSec.push(t); });
  let html='';
  Object.keys(secs).forEach(s=>{ html+=`<div class="sec-lbl">${s}</div>`; secs[s].forEach(t=>{html+=taskHtml(t);}); });
  if(noSec.length){ html+=`<div class="sec-lbl">Додаткові</div>`; noSec.forEach(t=>{html+=taskHtml(t);}); }
  wrap.innerHTML=html;
  updateProg(tasks);
}

function taskHtml(t){
  return `<div class="task${t.done?' done':''}" id="t-${t.id}">
    <div class="task-chk" onclick="toggleTask('${t.id}')"></div>
    <div class="task-body">
      ${t.time?`<div class="task-time">${t.time}</div>`:''}
      <div class="task-title">${esc(t.title)}</div>
      ${t.tag?`<div class="task-tag">${esc(t.tag)}</div>`:''}
    </div>
    <button class="task-del" onclick="delTask('${t.id}')">×</button>
  </div>`;
}

function esc(s){return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function toggleTask(id){
  const t=localTasks.find(x=>x.id===id);
  if(!t)return;
  t.done=!t.done;
  renderTasks();
  await updateTaskDone(id,t.done);
}

async function delTask(id){
  const p=getProfile();
  localTasks=localTasks.filter(t=>t.id!==id);
  renderTasks();
  try{ await sbFetch('/rest/v1/tasks?node_number=eq.'+p.node+'&task_id=eq.'+encodeURIComponent(id)+'&date=eq.'+TODAY_KEY,'DELETE'); }
  catch(e){console.error('delTask',e);}
}

async function quickAdd(){
  const titleEl=document.getElementById('q-title');
  const timeEl=document.getElementById('q-time');
  const tagEl=document.getElementById('q-tag');
  const title=titleEl.value.trim();
  if(!title)return;
  const p=getProfile();
  const newTask={id:'c'+Date.now(),sec:'',time:timeEl.value.trim(),title,tag:tagEl.value.trim(),done:false};
  localTasks.push(newTask);
  titleEl.value=''; timeEl.value=''; tagEl.value='';
  renderTasks(); titleEl.focus();
  try{
    await sbFetch('/rest/v1/tasks','POST',{node_number:p.node,task_id:newTask.id,section:null,time_slot:newTask.time||null,title:newTask.title,tag:newTask.tag||null,done:false,date:TODAY_KEY},{'Prefer':'return=representation'});
  }catch(e){console.error('quickAdd',e);}
}

async function clearTasks(){
  if(!confirm('Видалити всі задачі і скинути до стандартних?'))return;
  const p=getProfile();
  try{ await sbFetch('/rest/v1/tasks?node_number=eq.'+p.node+'&date=eq.'+TODAY_KEY,'DELETE'); }catch(e){}
  localTasks=JSON.parse(JSON.stringify(DEFAULT_TASKS));
  await saveTasksToDB(localTasks);
  renderTasks();
}

function updateProg(tasks){
  const total=tasks.length;
  const done=tasks.filter(t=>t.done).length;
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('prog-bar').style.width=pct+'%';
  document.getElementById('prog-pct').textContent=pct+'%';
}

// SAVE DAY — записує результат і скидає задачі
async function saveDay(){
  const tasks=localTasks||[];
  const total=tasks.length||1;
  const done=tasks.filter(t=>t.done).length;
  const pct=Math.round(done/total*100);
  const p=getProfile();
  const note=document.getElementById('save-note');
  try{
    // Кожне збереження = нова свічка
    await sbFetch('/rest/v1/daily_stats','POST',{node_number:p.node,date:TODAY_KEY,pct},{'Prefer':'return=representation'});
    // Оновити середнє
    const stats=await sbFetch('/rest/v1/daily_stats?node_number=eq.'+p.node+'&select=pct');
    const avg=stats?Math.round(stats.reduce((s,x)=>s+x.pct,0)/stats.length):pct;
    await sbFetch('/rest/v1/nodes?node_number=eq.'+p.node,'PATCH',{avg_eff:avg,days:stats?stats.length:1});
    // Видалити задачі і показати порожній список
    await sbFetch('/rest/v1/tasks?node_number=eq.'+p.node+'&date=eq.'+TODAY_KEY,'DELETE');
    localTasks=[];
    renderTasks();
    note.textContent='День збережено ✓';
    setTimeout(()=>{note.textContent='';},3000);
  }catch(e){
    note.textContent='Помилка: '+e.message;
    console.error('saveDay',e);
  }
}

function showReset(){document.getElementById('reset-row').classList.add('show');}
function hideReset(){document.getElementById('reset-row').classList.remove('show');}
async function doReset(){
  localTasks=localTasks.map(t=>({...t,done:false}));
  const p=getProfile();
  try{ await sbFetch('/rest/v1/tasks?node_number=eq.'+p.node+'&date=eq.'+TODAY_KEY,'PATCH',{done:false}); }catch(e){}
  document.getElementById('save-note').textContent='';
  hideReset(); renderTasks();
}

// CHART — японські свічки
async function renderChart(){
  const p=getProfile();
  const wrap=document.getElementById('chart-wrap');
  wrap.innerHTML='<div class="loading">Завантаження...</div>';
  try{
    const stats=await sbFetch('/rest/v1/daily_stats?node_number=eq.'+p.node+'&select=date,pct&order=date.asc');
    if(!stats||!stats.length){
      wrap.innerHTML='<div class="chart-empty">Немає даних.<br>Завершіть день і натисніть "Зберегти день".</div>';
      return;
    }
    const recent=stats.slice(-20);
    const avg=Math.round(stats.reduce((s,x)=>s+x.pct,0)/stats.length);
    const best=Math.max(...stats.map(x=>x.pct));
    const CH=120; // chart height px for 100%

    const candles=recent.map(x=>{
      const h=Math.max(Math.round((x.pct/100)*CH),4);
      const isUp=x.pct>=avg;
      const color=isUp?'#2d6a4f':'#1a1a18';
      const lbl=x.date.slice(5).replace('-','.');
      return `<div class="c-col" style="height:${CH+20}px">
        <div class="c-wick" style="height:${h+4}px;bottom:0;"></div>
        <div class="c-body" style="height:${h}px;bottom:0;background:${color};"></div>
        <div class="c-pct" style="bottom:${h+6}px;">${x.pct}%</div>
        <div class="c-date">${lbl}</div>
      </div>`;
    }).join('');

    const avgPx=Math.round((avg/100)*CH);

    wrap.innerHTML=`
      <div class="candles-outer">
        <div class="candles-wrap" style="height:${CH+52}px;align-items:flex-end;">
          ${candles}
          <div class="avg-line" style="bottom:${avgPx+28}px;"></div>
          <div class="avg-label" style="bottom:${avgPx+30}px;">avg ${avg}%</div>
        </div>
      </div>
      <div class="stats-grid">
        <div class="stat-cell"><span class="stat-n">${avg}%</span><span class="stat-l">Середнє</span></div>
        <div class="stat-cell"><span class="stat-n">${best}%</span><span class="stat-l">Найкраще</span></div>
        <div class="stat-cell"><span class="stat-n">${stats.length}</span><span class="stat-l">Днів</span></div>
      </div>
      <div style="display:flex;gap:16px;margin-top:8px;">
        <div style="display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);">
          <div style="width:10px;height:10px;background:#2d6a4f;border-radius:1px;flex-shrink:0;"></div>вище середнього
        </div>
        <div style="display:flex;align-items:center;gap:6px;font-family:'DM Mono',monospace;font-size:9px;color:var(--muted);">
          <div style="width:10px;height:10px;background:#1a1a18;border-radius:1px;flex-shrink:0;"></div>нижче середнього
        </div>
      </div>`;
  }catch(e){
    wrap.innerHTML='<div class="chart-empty">Помилка завантаження</div>';
  }
}

async function clearHistory(){
  if(!confirm('Видалити всю статистику?'))return;
  const p=getProfile();
  try{
    await sbFetch('/rest/v1/rpc/delete_user_stats','POST',{p_node:p.node});
    await sbFetch('/rest/v1/nodes?node_number=eq.'+p.node,'PATCH',{avg_eff:0,days:0});
    renderChart();
  }catch(e){console.error('clearHistory',e);}
}

// NODES
let lastGenHash='';

async function renderNodes(){
  const p=getProfile();
  const wrap=document.getElementById('nodes-wrap');
  wrap.innerHTML='<div class="loading">Завантаження...</div>';
  try{
    const nodes=await sbFetch('/rest/v1/nodes?select=*&order=avg_eff.desc&limit=10');
    const hashes=await sbFetch('/rest/v1/hashes?issued_by=eq.'+p.node+'&select=*&order=created_at.desc');

    const rows=(nodes||[]).map((n,i)=>{
      const isMe=n.node_number===p.node;
      const bw=Math.round((n.avg_eff||0)*0.6);
      const inv=n.invited_by!=null?'← Node '+n.invited_by:'засновник';
      return `<tr class="${isMe?'me':''}">
        <td><span class="lb-rank">${i+1}</span></td>
        <td>
          <div style="display:flex;align-items:center;gap:6px">
            <div class="lb-bar${isMe?' me':''}" style="width:${bw}px"></div>
            Node ${n.node_number}${isMe?'<span class="lb-you">(ви)</span>':''}
          </div>
          <div style="font-size:10px;color:var(--muted);margin-top:2px">${n.name} <span style="opacity:.5">${inv}</span></div>
        </td>
        <td>${n.avg_eff||0}%</td>
        <td style="color:var(--muted)">${n.days||0}д</td>
      </tr>`;
    }).join('');

    const hashItems=(hashes||[]).map(h=>{
      const inactive=h.used_by||h.revoked;
      return `<div class="hash-item">
        <div class="hash-item-val" style="color:${inactive?'var(--done)':'var(--text)'};${inactive?'opacity:.6':''}">${h.hash}</div>
        <div class="hash-item-meta">${h.created_at.slice(0,10)}${h.revoked?' · деактивовано':''}</div>
        <div style="display:flex;justify-content:space-between;align-items:center;margin-top:6px;">
          <div class="hash-item-btns">
            ${!inactive?`
              <button class="h-btn" onclick="copyHashItem('${h.hash}',this)">Копіювати</button>
              <button class="h-btn h-btn-red" onclick="revokeHash(${h.id})">Деактивувати</button>
            `:''}
          </div>
          <div class="h-status${h.used_by?' used':h.revoked?' revoked':''}">
            ${h.used_by?'✓ '+h.used_by+' (Node '+h.used_node+')':h.revoked?'відкликано':'очікує'}
          </div>
        </div>
      </div>`;
    }).join('')||'<div style="font-family:\'DM Mono\',monospace;font-size:11px;color:var(--muted);padding:12px 0">Ще не згенеровано жодного хешу</div>';

    wrap.innerHTML=`
      <div class="lb-ttl">Топ 10 Nodes — середня ефективність</div>
      <table class="lb-tbl">
        <thead><tr><th style="width:28px">#</th><th>Node</th><th>Eff</th><th>Днів</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
      <div class="hash-sec">
        <div class="hash-sec-ttl">Генератор хешів</div>
        <div class="hash-desc">Згенеруйте SHA-256 хеш і передайте новому учаснику. Кожен хеш одноразовий.</div>
        <div class="hash-box" id="hash-box" onclick="copyLastHash()">
          <div class="hash-val" id="hash-val"></div>
          <div class="hash-meta" id="hash-meta"></div>
        </div>
        <div class="hash-copied" id="hash-copied"></div>
        <div class="btns" style="margin-bottom:24px;">
          <button class="btn" onclick="genHash()">Генерувати хеш</button>
        </div>
        <div class="hash-sec-ttl">Видані хеші (${(hashes||[]).length})</div>
        ${hashItems}
      </div>
      <div class="prof-sec">
        <div class="hash-sec-ttl">Ваш профіль</div>
        <div class="prof-row"><span class="prof-key">Node</span><span class="prof-val">${p.node}</span></div>
        <div class="prof-row"><span class="prof-key">Ім'я</span><span class="prof-val">${p.name}</span></div>
        <div class="prof-row"><span class="prof-key">Приєднався</span><span class="prof-val">${p.joinedAt}</span></div>
        <div class="prof-row"><span class="prof-key">Запрошений</span><span class="prof-val">${p.invitedBy!=null?'Node '+p.invitedBy:'засновник'}</span></div>
      </div>`;
  }catch(e){
    wrap.innerHTML='<div class="loading">Помилка завантаження</div>';
  }
}

async function genHash(){
  const p=getProfile();
  const hash=await sha256('prs'+p.node+p.name+Date.now()+Math.random());
  lastGenHash=hash;
  try{
    await sbFetch('/rest/v1/hashes','POST',{hash,issued_by:p.node,revoked:false},{'Prefer':'return=representation'});
    const box=document.getElementById('hash-box');
    if(box){
      box.style.display='block';
      document.getElementById('hash-val').textContent=hash;
      document.getElementById('hash-meta').textContent='SHA-256 · Node '+p.node+' · '+TODAY_KEY+' · натисніть щоб скопіювати';
      document.getElementById('hash-copied').textContent='';
    }
    renderNodes();
  }catch(e){alert('Помилка генерації хешу');}
}

function copyLastHash(){
  if(!lastGenHash)return;
  navigator.clipboard.writeText(lastGenHash).then(()=>{
    const el=document.getElementById('hash-copied');
    if(el){el.textContent='✓ скопійовано';setTimeout(()=>{el.textContent='';},2000);}
  });
}

function copyHashItem(hash,btn){
  navigator.clipboard.writeText(hash).then(()=>{
    const orig=btn.textContent;
    btn.textContent='✓ скопійовано';
    setTimeout(()=>{btn.textContent=orig;},2000);
  }).catch(()=>{
    const el=btn.closest('.hash-item').querySelector('.hash-item-val');
    if(el){const r=document.createRange();r.selectNodeContents(el);window.getSelection().removeAllRanges();window.getSelection().addRange(r);}
  });
}

async function revokeHash(id){
  if(!confirm('Деактивувати цей хеш?'))return;
  try{
    await sbFetch('/rest/v1/hashes?id=eq.'+id,'PATCH',{revoked:true,revoked_at:TODAY_KEY});
    renderNodes();
  }catch(e){alert('Помилка');}
}

function tab(name){
  document.querySelectorAll('.nav-btn').forEach((b,i)=>{b.classList.toggle('active',['plan','chart','nodes'][i]===name);});
  document.querySelectorAll('.view').forEach(v=>{v.classList.toggle('active',v.id==='v-'+name);});
  if(name==='chart')renderChart();
  if(name==='nodes')renderNodes();
}

boot();
</script>
</body>
</html>
